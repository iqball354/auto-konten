services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: autokonten_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - media_storage:/app/storage/app/public
    networks:
      - autokonten

volumes:
  media_storage:

networks:
  autokonten:
    driver: bridge